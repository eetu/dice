# bacon — Rust backend dev runner. `bacon` (TUI) for local work, or
# `bacon --headless -j run` (what `just dev` invokes) to stream logs into the
# composed dev output. Reloads on source + .env changes.
default_job = "run"

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false

[jobs.run]
command = ["cargo", "run", "--color", "always"]
need_stdout = true
allow_warnings = true
background = true
on_change_strategy = "kill_then_restart"
watch = [".env"]
