name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: frontend/.node-version
      # Vendored yarn (no corepack): invoke the committed release directly.
      - run: node .yarn/releases/yarn-*.cjs install --immutable
      - run: node .yarn/releases/yarn-*.cjs lint
      - run: node .yarn/releases/yarn-*.cjs format
      - run: node .yarn/releases/yarn-*.cjs typecheck
      - run: node .yarn/releases/yarn-*.cjs build
      - run: node .yarn/releases/yarn-*.cjs test

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      # Spawned-binary integration tests are #[ignore]d; build the debug binary
      # they spawn, then run them explicitly.
      - run: cargo build
      - run: cargo test -p dice-integration -- --ignored
      - run: cargo build --release

  # Full-stack golden path: the real backend serving the built SPA in a real
  # browser (the documented guard that the SPA still boots under the CSP).
  e2e:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: frontend/.node-version
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cd frontend && node .yarn/releases/yarn-*.cjs install --immutable
      - run: cd frontend && node .yarn/releases/yarn-*.cjs build
      - run: cargo build # debug dice-backend for the Playwright webServer
      - run: cd frontend && node .yarn/releases/yarn-*.cjs playwright install --with-deps chromium
      - run: cd frontend && node .yarn/releases/yarn-*.cjs e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: |
            frontend/test-results
            frontend/playwright-report
          retention-days: 7

  # Single always-run gate for branch protection (filtered jobs skip, they don't
  # fail — never require them by name or a PR strands at "waiting for status").
  ci-gate:
    if: always()
    needs: [frontend, backend, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          echo "frontend=${{ needs.frontend.result }} backend=${{ needs.backend.result }} e2e=${{ needs.e2e.result }}"
          for r in "${{ needs.frontend.result }}" "${{ needs.backend.result }}" "${{ needs.e2e.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then exit 1; fi
          done
