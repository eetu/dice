version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5
    groups:
      three:
        patterns: ["three", "@types/three"]
      svelte:
        patterns: ["svelte", "svelte-check", "@sveltejs/*"]
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5
    groups:
      axum:
        patterns: ["axum", "axum-*", "tower-*"]
      tokio:
        patterns: ["tokio", "tokio-*"]

  # docker + github-actions: default-days ONLY — the semver-* keys break parsing
  # for these two ecosystems.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
